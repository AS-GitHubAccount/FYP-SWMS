<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Warehouse Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body data-no-page-notification>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>SWMS</h1>
                <p>Smart Warehouse Management System</p>
            </div>
            
            <form id="loginForm" class="login-form" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="Email address"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Password
                    </label>
                    <div class="password-container">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">
                        <i class="fas fa-user-tag" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Position
                    </label>
                    <select id="role" class="form-select" required>
                        <option value="">Please select ---</option>
                        <option value="Admin">Administrator</option>
                        <option value="Staff">Warehouse Staff</option>
                    </select>
                    <span class="error-message" id="roleError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                </div>

                <!-- General Error Message -->
                <div id="generalError" class="general-error-message hidden"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 0;">
                    <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>
                    Sign In
                </button>
            </form>

            <p class="form-hint" style="margin: 0.75rem 0 0; text-align: center; color: var(--text-secondary); font-size: 0.875rem;">
                <a href="forgot-password.html" class="login-forgot-link">Forgot password?</a>
            </p>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/app.js?v=3"></script>
    <script>
        console.log('Script loaded');
        
        const API_BASE_URL = typeof window.getSwmsApiBase === 'function' ? window.getSwmsApiBase() : (window.API_BASE_URL || window.API_BASE || 'http://localhost:3000/api');
        
        // Password toggle functionality
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        });

        // Handle select dropdown color change
        document.getElementById('role').addEventListener('change', function() {
            if (this.value) {
                this.style.color = 'var(--text-primary)';
            } else {
                this.style.color = 'var(--text-secondary)';
            }
        });
        
        // Initialize select color
        document.getElementById('role').style.color = 'var(--text-secondary)';
        
        // Load saved email and role if remember me was checked
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('sessionExpired') === '1') {
                sessionStorage.removeItem('sessionExpired');
                const err = document.getElementById('generalError');
                if (err) {
                    err.textContent = 'Your session has expired. Please log in again.';
                    err.classList.remove('hidden');
                    err.style.display = 'block';
                    err.style.backgroundColor = 'rgba(74, 144, 226, 0.1)';
                    err.style.borderColor = '#4a90e2';
                    err.style.color = '#1a5a9e';
                }
            }
            const savedEmail = localStorage.getItem('savedEmail');
            const savedRole = localStorage.getItem('savedRole');
            const rememberMe = localStorage.getItem('rememberMe');
            
            if (rememberMe === 'true' && savedEmail) {
                const emailInput = document.getElementById('email');
                const roleSelect = document.getElementById('role');
                const rememberMeCheckbox = document.getElementById('rememberMe');
                
                if (emailInput) {
                    emailInput.value = savedEmail;
                }
                if (savedRole && roleSelect) {
                    roleSelect.value = savedRole;
                    // Update select color based on value
                    if (savedRole) {
                        roleSelect.style.color = 'var(--text-primary)';
                    }
                }
                if (rememberMeCheckbox) {
                    rememberMeCheckbox.checked = true;
                }
                console.log('Loaded saved email:', savedEmail, 'and role:', savedRole);
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('generalError');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                errorDiv.style.display = 'block';
                console.log('Error shown:', message);
            }
        }
        
        function hideError() {
            const errorDiv = document.getElementById('generalError');
            if (errorDiv) {
                errorDiv.classList.add('hidden');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('Form submitted!');
            
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            console.log('Form values:', { email, password: '***', role });
            
            // Simple validation
            if (!email || !password || !role) {
                showError('Please fill in all fields');
                return;
            }
            
            // Map role
            const roleMap = {
                'Admin': 'ADMIN',
                'Staff': 'STAFF',
                'Administrator': 'ADMIN',
                'Warehouse Staff': 'STAFF'
            };
            const backendRole = roleMap[role] || role.toUpperCase();
            
            console.log('Sending to API:', { email, role: backendRole });
            
            // Disable submit button
            const submitButton = e.target.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.innerHTML;
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i>Signing In...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email.toLowerCase(),
                        password: password,
                        role: backendRole
                    })
                });
                
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (!response.ok) {
                    var loginMsg = data.message || data.error || 'Login failed';
                    if (data.error === 'invitation_pending' && data.message) {
                        loginMsg = data.message;
                    }
                    showError(loginMsg);
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                    return;
                }
                
                if (data.success && data.data && data.data.token) {
                    // Store token and user data (sessionStorage for this tab; localStorage so new tabs / purchasing-history can send Authorization)
                    sessionStorage.setItem('authToken', data.data.token);
                    try { localStorage.setItem('authToken', data.data.token); } catch (e) {}
                    if (data.data.refreshToken) {
                        sessionStorage.setItem('refreshToken', data.data.refreshToken);
                    }
                    if (data.data.user) {
                        sessionStorage.setItem('userRole', data.data.user.role);
                        sessionStorage.setItem('userId', data.data.user.userId);
                        sessionStorage.setItem('userName', data.data.user.name);
                        sessionStorage.setItem('userEmail', data.data.user.email);
                    }
                    console.log('Token stored, redirecting...');
                    
                    // Store remember me
                    const rememberMe = document.getElementById('rememberMe').checked;
                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                        localStorage.setItem('savedEmail', email);
                        localStorage.setItem('savedRole', role); // Save the role/position
                    } else {
                        localStorage.removeItem('rememberMe');
                        localStorage.removeItem('savedEmail');
                        localStorage.removeItem('savedRole'); // Remove saved role
                    }
                    
                    // Show success notification if function exists
                    if (typeof showNotification === 'function') {
                        showNotification('Login successful!', 'success');
                    }
                    
                    // Redirect based on role and path
                    const currentPath = window.location.pathname;
                    const userRole = (data.data.user && data.data.user.role) ? String(data.data.user.role).toUpperCase() : '';
                    let targetPage = 'dashboard.html';

                    if (currentPath.includes('/prototypes/')) {
                        targetPage = targetPage; // relative
                    } else {
                        targetPage = '/prototypes/' + targetPage; // when served from root
                    }

                    window.location.href = targetPage;
                } else {
                    showError('Invalid response from server');
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Cannot connect to server. Make sure backend is running at http://localhost:3000');
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonText;
            }
        });
        
        console.log('Event listener attached');
    </script>
</body>
</html>
