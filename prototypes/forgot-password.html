<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Warehouse Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body data-no-page-notification>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1><i class="fas fa-key" style="margin-right: 0.5rem;"></i>Reset Password</h1>
            </div>

            <form id="forgotPasswordForm" class="login-form" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Email Address
                    </label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="Enter your email address"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">
                        <i class="fas fa-user" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Full Name
                    </label>
                    <input
                        type="text"
                        id="name"
                        class="form-input"
                        placeholder="Enter your full name"
                        required
                    >
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="role" class="form-label">
                        <i class="fas fa-user-tag" style="margin-right: 0.5rem; color: var(--text-secondary);"></i>
                        Position
                    </label>
                    <select id="role" class="form-select" required>
                        <option value="">Select your position</option>
                        <option value="Admin">Administrator</option>
                        <option value="Staff">Warehouse Staff</option>
                    </select>
                    <span class="error-message" id="roleError"></span>
                </div>

                <div id="generalError" class="general-error-message hidden"></div>

                <div id="successMessage" class="general-error-message hidden" style="background-color: #d4edda; color: #155724; border-color: #c3e6cb;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 0;">
                    <i class="fas fa-paper-plane" style="margin-right: 0.5rem;"></i>
                    Send reset email
                </button>

                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="login.html" class="login-forgot-link" style="color: var(--primary-color); text-decoration: none;">
                        <i class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i>
                        Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/app.js?v=3"></script>
    <script>
        const roleSelect = document.getElementById('role');
        roleSelect.addEventListener('change', function () {
            this.style.color = this.value ? 'var(--text-primary)' : 'var(--text-secondary)';
        });
        roleSelect.style.color = 'var(--text-secondary)';

        function showError(message) {
            const errorDiv = document.getElementById('generalError');
            const successDiv = document.getElementById('successMessage');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                errorDiv.style.display = 'block';
            }
            if (successDiv) {
                successDiv.classList.add('hidden');
                successDiv.style.display = 'none';
            }
            errorDiv?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showSuccess(message) {
            const errorDiv = document.getElementById('generalError');
            const successDiv = document.getElementById('successMessage');
            if (successDiv) {
                successDiv.textContent = message;
                successDiv.classList.remove('hidden');
                successDiv.style.display = 'block';
            }
            if (errorDiv) {
                errorDiv.classList.add('hidden');
                errorDiv.style.display = 'none';
            }
            successDiv?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideMessages() {
            const errorDiv = document.getElementById('generalError');
            const successDiv = document.getElementById('successMessage');
            if (errorDiv) errorDiv.classList.add('hidden');
            if (successDiv) successDiv.classList.add('hidden');
        }

        document.getElementById('email').addEventListener('input', hideMessages);
        document.getElementById('name').addEventListener('input', hideMessages);
        roleSelect.addEventListener('change', hideMessages);

        document.getElementById('forgotPasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();
            const role = document.getElementById('role').value;

            if (!email || !name || !role) {
                showError('Please fill in all fields');
                return;
            }

            const roleMap = {
                Admin: 'ADMIN',
                Staff: 'STAFF',
                Administrator: 'ADMIN',
                'Warehouse Staff': 'STAFF'
            };
            const backendRole = roleMap[role] || String(role).toUpperCase();

            const submitButton = e.target.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.innerHTML;
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i>Sending...';

            const base = (typeof window.getSwmsApiBase === 'function' ? window.getSwmsApiBase() : (window.API_BASE_URL || window.API_BASE || 'http://localhost:3000/api')).replace(/\/$/, '');

            try {
                const response = await fetch(base + '/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                    body: JSON.stringify({
                        email: email.toLowerCase(),
                        name: name,
                        role: backendRole
                    })
                });

                const data = await response.json().catch(function () {
                    return {};
                });

                if (!response.ok) {
                    showError(data.error || data.message || 'Failed to reset password');
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                    return;
                }

                if (data.success) {
                    showSuccess(
                        data.message ||
                            'A password reset link has been sent to your email address. Please check your inbox and reset your password.'
                    );
                } else {
                    showError(
                        data.error ||
                            data.message ||
                            'No matching record was found in the system. Please check your input.'
                    );
                }
            } catch (err) {
                console.error(err);
                showError('Cannot connect to server. Make sure the backend is running (e.g. http://localhost:3000).');
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonText;
            }
        });
    </script>
</body>
</html>
