<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set your password - Smart Warehouse Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>.hidden { display: none !important; }</style>
</head>
<body data-no-page-notification>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1><i class="fas fa-user-shield" style="margin-right: 0.5rem;"></i>Set your password</h1>
                <p id="subtitle">Choose a password to activate your account.</p>
            </div>

            <div id="loadingState" class="login-form" style="text-align: center; color: var(--text-secondary); padding: 1rem;">
                <i class="fas fa-spinner fa-spin"></i> Checking your link…
            </div>

            <form id="setPasswordForm" class="login-form hidden" novalidate>
                <p id="emailHint" class="form-hint" style="margin-bottom: 1rem; text-align: center;"></p>
                <div class="form-group">
                    <label for="newPassword" class="form-label">New password</label>
                    <input type="password" id="newPassword" class="form-input" minlength="6" required autocomplete="new-password" placeholder="At least 6 characters">
                    <span class="error-message" id="newPasswordError"></span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm password</label>
                    <input type="password" id="confirmPassword" class="form-input" minlength="6" required autocomplete="new-password" placeholder="Repeat password">
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>
                <div id="generalError" class="general-error-message hidden"></div>
                <div id="successMessage" class="general-error-message hidden" style="background-color: #d4edda; color: #155724; border-color: #c3e6cb;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 0;">
                    <i class="fas fa-check" style="margin-right: 0.5rem;"></i>
                    Save password &amp; continue
                </button>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="login.html" style="color: var(--primary-color); text-decoration: none;">
                        <i class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i>
                        Back to Login
                    </a>
                </div>
            </form>

            <div id="invalidState" class="login-form hidden" style="text-align: center;">
                <p id="invalidMessage" style="color: var(--text-secondary); margin-bottom: 1rem;"></p>
                <a href="login.html" class="btn btn-primary" style="display: inline-block; text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        const API_BASE_URL = typeof window.getSwmsApiBase === 'function' ? window.getSwmsApiBase() : (window.API_BASE_URL || window.API_BASE || 'http://localhost:3000/api');

        function qs(name) {
            const p = new URLSearchParams(window.location.search);
            return (p.get(name) || '').trim();
        }

        function show(el, on) {
            if (!el) return;
            el.classList.toggle('hidden', !on);
            el.style.display = on ? '' : 'none';
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const token = qs('token');
            const loading = document.getElementById('loadingState');
            const form = document.getElementById('setPasswordForm');
            const invalid = document.getElementById('invalidState');

            if (!token) {
                show(loading, false);
                show(invalid, true);
                document.getElementById('invalidMessage').textContent =
                    'This page needs a valid link from your invitation or reset email.';
                return;
            }

            try {
                const r = await fetch(API_BASE_URL + '/auth/invitation-preview?token=' + encodeURIComponent(token));
                const data = await r.json().catch(function() { return {}; });
                show(loading, false);
                if (data.success && data.valid) {
                    show(form, true);
                    var hint = document.getElementById('emailHint');
                    if (hint && data.emailHint) {
                        hint.textContent = 'Setting password for: ' + data.emailHint;
                    }
                } else {
                    show(invalid, true);
                    document.getElementById('invalidMessage').textContent =
                        'This link is invalid or has expired. Ask your administrator to resend your invitation or reset email.';
                }
            } catch (e) {
                show(loading, false);
                show(invalid, true);
                document.getElementById('invalidMessage').textContent =
                    'Cannot reach the server. Ensure the backend is running and try again.';
            }

            document.getElementById('setPasswordForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                var p1 = document.getElementById('newPassword').value;
                var p2 = document.getElementById('confirmPassword').value;
                var ge = document.getElementById('generalError');
                var sm = document.getElementById('successMessage');
                ge.classList.add('hidden');
                sm.classList.add('hidden');

                if (p1.length < 6) {
                    ge.textContent = 'Password must be at least 6 characters.';
                    ge.classList.remove('hidden');
                    return;
                }
                if (p1 !== p2) {
                    ge.textContent = 'Passwords do not match.';
                    ge.classList.remove('hidden');
                    return;
                }

                var btn = e.target.querySelector('button[type="submit"]');
                var orig = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i>Saving…';

                try {
                    var res = await fetch(API_BASE_URL + '/auth/complete-invitation', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token, newPassword: p1 })
                    });
                    var j = await res.json().catch(function() { return {}; });
                    if (res.ok && j.success) {
                        sm.innerHTML = (j.message || 'Password saved.') + ' <br><br>Redirecting to login…';
                        sm.classList.remove('hidden');
                        setTimeout(function() { window.location.href = 'login.html'; }, 2000);
                    } else {
                        ge.textContent = j.message || j.error || 'Could not set password.';
                        ge.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerHTML = orig;
                    }
                } catch (err) {
                    ge.textContent = 'Network error. Check that the backend is running.';
                    ge.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = orig;
                }
            });
        });
    </script>
</body>
</html>
