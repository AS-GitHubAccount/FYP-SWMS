<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - SWMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Libraries for PDF and Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .report-btn {
            transition: all 0.3s ease;
        }
        
        .report-btn.selected {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            color: white !important;
            font-weight: 600;
        }

        /* Report output (screen) — override global tables (large padding, tiny uppercase th) */
        #reportContent {
            font-size: 14px;
            line-height: 1.35;
        }
        #reportContent > p,
        #reportContent p {
            margin-top: 0;
            margin-bottom: 8px;
        }
        #reportContent .report-range-heading {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
            margin: 0 0 8px 0;
        }
        #reportContent .report-section-title {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.3;
            margin: 14px 0 6px 0;
        }
        #reportContent .report-section-title:first-of-type {
            margin-top: 4px;
        }
        #reportContent .report-table-scroll {
            overflow-x: auto;
            margin-bottom: 12px;
        }
        #reportContent .report-table-scroll:last-child {
            margin-bottom: 0;
        }
        #reportContent .table-container {
            width: 100%;
        }
        #reportContent .report-table-scroll .table-container {
            min-width: 720px;
        }
        #reportContent table {
            font-size: 13px !important;
            line-height: 1.3 !important;
        }
        #reportContent table th,
        #reportContent table td {
            padding: 6px 10px !important;
            font-size: 13px !important;
            line-height: 1.3 !important;
            vertical-align: top;
        }
        #reportContent table th {
            font-size: 12px !important;
            font-weight: 600;
            text-transform: none !important;
            letter-spacing: normal !important;
            color: var(--text) !important;
        }

        /* Only while html2canvas runs — balanced size for PDF (between tiny and oversized) */
        #reportContent.report-pdf-capture {
            padding: 11px 12px !important;
            font-size: 14px;
            line-height: 1.35;
            max-width: 100%;
        }
        #reportContent.report-pdf-capture p {
            margin: 0 0 6px 0 !important;
        }
        #reportContent.report-pdf-capture .report-range-heading,
        #reportContent.report-pdf-capture .report-section-title {
            margin-top: 8px !important;
            margin-bottom: 4px !important;
            line-height: 1.3 !important;
        }
        #reportContent.report-pdf-capture .report-range-heading:first-child {
            margin-top: 0 !important;
        }
        #reportContent.report-pdf-capture > div[style*="overflow-x"] {
            margin-bottom: 8px !important;
        }
        #reportContent.report-pdf-capture table {
            line-height: 1.25 !important;
        }
        #reportContent.report-pdf-capture table th,
        #reportContent.report-pdf-capture table td {
            padding: 5px 9px !important;
            font-size: 13px !important;
            line-height: 1.3 !important;
            vertical-align: top;
        }
        #reportContent.report-pdf-capture table th {
            font-size: 12px !important;
            text-transform: none;
            letter-spacing: normal;
        }
        
        @media print {
            /* Hide everything except report content */
            header,
            .page-header,
            .card-header button,
            .card:not(#reportResults),
            #reportResults .card-header button,
            #reportResults .card-header {
                display: none !important;
            }
            
            /* Show only the report results */
            body {
                margin: 0;
                padding: 20px;
                font-size: 12pt;
            }
            
            #reportResults {
                display: block !important;
                page-break-inside: auto;
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 0;
            }
            
            #reportContent {
                padding: 0 !important;
                font-size: 11pt !important;
                line-height: 1.35 !important;
            }
            
            /* Report title - show in print */
            #printTitle {
                display: block !important;
                font-size: 18pt;
                font-weight: bold;
                margin-bottom: 15px;
            }
            
            #reportTitle {
                display: none !important;
            }
            
            /* Summary paragraph */
            #reportContent p {
                margin-bottom: 8px !important;
                font-size: 11pt !important;
            }
            #reportContent .report-range-heading,
            #reportContent .report-section-title {
                margin-top: 10px !important;
                margin-bottom: 6px !important;
                font-size: 12pt !important;
            }
            
            /* Ensure tables print properly */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
                margin-top: 10px;
            }
            
            table thead {
                display: table-header-group;
            }
            
            table tbody {
                display: table-row-group;
            }
            
            table tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            
            table th,
            table td {
                border: 1px solid #000 !important;
                padding: 6px 8px !important;
                text-align: left;
                font-size: 10pt;
            }

            #reportContent table th,
            #reportContent table td {
                padding: 4px 8px !important;
                font-size: 10pt !important;
                line-height: 1.28 !important;
            }
            #reportContent table th {
                text-transform: none !important;
                letter-spacing: normal !important;
            }
            
            table th {
                background-color: #f0f0f0 !important;
                font-weight: bold;
            }
            
            /* Hide badges and buttons in print */
            .badge,
            .btn {
                display: none !important;
            }
            
            /* Hide h3 tags in print (for movement report) */
            h3 {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar" aria-label="Main navigation"></aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()" aria-hidden="true"></div>
        <div class="main-wrapper">
            <header class="header">
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                    <i data-lucide="menu"></i>
                </button>
                <div class="header-compact">
                    <a href="notifications.html" class="notification-icon" style="position: relative; text-decoration: none; padding: 0.5rem; color: var(--text);">
                        <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
                        <span id="notificationBadge" class="badge badge-danger" style="position: absolute; top: -4px; right: -4px; font-size: 0.65rem; display: none; min-width: 16px; padding: 2px 5px;">0</span>
                    </a>
                    <div class="user-profile-wrap">
                        <button id="profileAvatarBtn" class="profile-avatar-btn" type="button" onclick="toggleProfileDropdown(event)" aria-haspopup="true" aria-expanded="false" title="Account">
                            <span class="profile-avatar-initial" id="profileAvatarInitial">U</span>
                        </button>
                        <div id="profileDropdown" class="profile-dropdown" style="display: none;" role="menu">
                            <div class="profile-dropdown-header">
                                <div class="profile-dropdown-name" id="profileUserName">User</div>
                                <div class="profile-dropdown-email" id="profileUserEmail">user@example.com</div>
                            </div>
                            <a href="settings.html" class="profile-dropdown-item" role="menuitem">Settings</a>
                            <button type="button" class="profile-dropdown-item profile-dropdown-logout" onclick="handleLogout(event)" role="menuitem">Logout</button>
                        </div>
                    </div>
                </div>
            </header>

    <main class="container-fluid">
        <div class="page-header">
            <h1 class="page-title">Reports</h1>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Stock Reports</h2>
                </div>
                <div style="padding: 1.5rem;">
                    <button id="btn-inventory" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('inventory')">Inventory Summary</button>
                    <button id="btn-lowStock" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('lowStock')">Low Stock Alert</button>
                    <button id="btn-expiry" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('expiry')">Expiry Report</button>
                    <button id="btn-batch" class="btn btn-primary report-btn" style="width: 100%;" onclick="generateReport('batch')">Batch Details</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Transaction Reports</h2>
                </div>
                <div style="padding: 1.5rem;">
                    <button id="btn-inRecords" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('inRecords')">Stock Receipts</button>
                    <button id="btn-outRecords" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('outRecords')">Stock Issues</button>
                    <button id="btn-movement" class="btn btn-primary report-btn" style="width: 100%; margin-bottom: 0.5rem;" onclick="generateReport('movement')">Stock Movement</button>
                    <button id="btn-bookings" class="btn btn-primary report-btn" style="width: 100%;" onclick="generateReport('bookings')">Booking Report</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Date Range Reports</h2>
                </div>
                <div style="padding: 1.5rem;">
                    <div class="form-group">
                        <label for="fromDate" class="form-label">From Date</label>
                        <input type="date" id="fromDate" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="toDate" class="form-label">To Date</label>
                        <input type="date" id="toDate" class="form-input">
                    </div>
                    <button id="btn-dateRange" class="btn btn-primary report-btn" style="width: 100%;" onclick="generateDateRangeReport()">Generate Report</button>
                </div>
            </div>
        </div>

        <div id="reportResults" class="card" style="display: none;">
            <div class="card-header">
                <h2 class="card-title" id="reportTitle">Report Results</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-primary-green" onclick="exportToPDF()"><i data-lucide="download" style="width:14px;height:14px;margin-right:0.25rem;vertical-align:middle;"></i>Export PDF</button>
                    <button class="btn btn-primary-green" onclick="exportToExcel()"><i data-lucide="file-spreadsheet" style="width:14px;height:14px;margin-right:0.25rem;vertical-align:middle;"></i>Export Excel</button>
                    <button class="btn btn-primary-green" onclick="printReport()"><i data-lucide="printer" style="width:14px;height:14px;margin-right:0.25rem;vertical-align:middle;"></i>Print</button>
                </div>
            </div>
            <div id="reportContent" style="padding: 1.5rem;">
                <!-- Report content will be generated here -->
            </div>
        </div>
        
        <!-- Print-only title (hidden on screen, shown in print) -->
        <div id="printTitle" style="display: none;"></div>
    </main>

        </div><!-- .main-wrapper -->
    </div><!-- .app-layout -->

    <script src="js/api-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/shell-nav.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar && overlay) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('open');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof lucide !== 'undefined') lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
        });

        // Admin "Users" link is injected by js/shell-nav.js — do not reference legacy #usersLink (missing → script error breaks all report buttons).

        // Ensure storage is available
        if (typeof window.storage === 'undefined') {
            window.storage = {
                get: function(key) {
                    try {
                        const item = localStorage.getItem(key);
                        return item ? JSON.parse(item) : null;
                    } catch(e) {
                        return null;
                    }
                },
                set: function(key, value) {
                    try {
                        localStorage.setItem(key, JSON.stringify(value));
                    } catch(e) {
                        console.error('Failed to save to storage', e);
                    }
                }
            };
        }

        // Store current report type and data for export
        let currentReportType = null;
        let currentReportData = null;

        /** Normalize API/mock dates to YYYY-MM-DD for comparisons with <input type="date">. */
        function toYyyyMmDd(val) {
            if (val == null || val === '') return '';
            const s = String(val).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const d = new Date(s);
            if (isNaN(d.getTime())) return '';
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }
        function recordFallsInYmdRange(r, fromYmd, toYmd) {
            const raw = r.date != null && r.date !== '' ? r.date : (r.receivedDate != null && r.receivedDate !== '' ? r.receivedDate : r.issuedDate);
            const d = toYyyyMmDd(raw);
            if (!d) return false;
            return d >= fromYmd && d <= toYmd;
        }

        function escapeHtml(s) {
            if (s == null || s === '') return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function sortDetailRecordsAsc(records) {
            return (records || []).slice().sort(function (a, b) {
                const da = toYyyyMmDd(a.date != null && a.date !== '' ? a.date : (a.receivedDate || a.issuedDate));
                const db = toYyyyMmDd(b.date != null && b.date !== '' ? b.date : (b.receivedDate || b.issuedDate));
                if (da !== db) return da.localeCompare(db);
                return String(a.recordNumber || a.id || '').localeCompare(String(b.recordNumber || b.id || ''));
            });
        }

        // Function to update button selected state
        function updateSelectedButton(reportType) {
            // Remove selected class from all report buttons
            const allButtons = document.querySelectorAll('.report-btn');
            allButtons.forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // Add selected class to the clicked button
            const buttonId = 'btn-' + reportType;
            const selectedButton = document.getElementById(buttonId);
            if (selectedButton) {
                selectedButton.classList.add('selected');
            }
        }

        async function fetchReportDataFromAPI() {
            try {
                const token = sessionStorage.getItem('authToken');
                const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
                const base = window.API_BASE_URL || 'http://localhost:3000/api';
                const [invRes, batchRes, recvRes, issueRes] = await Promise.all([
                    fetch(base + '/inventory', { headers }).catch(() => null),
                    fetch(base + '/batches', { headers }).catch(() => null),
                    fetch(base + '/receiving', { headers }).catch(() => null),
                    fetch(base + '/issuing', { headers }).catch(() => null)
                ]);
                if (invRes && invRes.ok) {
                    const d = await invRes.json();
                    if (d.success && d.data) {
                        const mapped = d.data.map(i => ({ id: i.productId, productId: i.productId, sku: i.sku, name: i.name, category: i.category || '', totalQty: i.totalQty || 0, available: i.available || 0, reserved: i.reserved || 0, minStock: i.minStock || 0, status: i.status, nonExpiredQty: i.nonExpiredQty, location: i.location }));
                        window.storage.set('products', mapped);
                    }
                }
                if (batchRes && batchRes.ok) {
                    const d = await batchRes.json();
                    if (d.success && d.data) window.storage.set('batches', d.data);
                }
                if (recvRes && recvRes.ok) {
                    const d = await recvRes.json();
                    if (d.success && Array.isArray(d.data)) {
                        window.storage.set('inRecords', d.data.map(function (r) {
                            const by = r.receivedByName != null ? String(r.receivedByName) : (r.receivedBy != null ? String(r.receivedBy) : '');
                            return {
                                id: r.recordId,
                                recordNumber: r.recordNumber,
                                date: toYyyyMmDd(r.receivedDate),
                                product: r.productName || r.productSku || '',
                                productSku: r.productSku || '',
                                productId: r.productId,
                                batchId: r.batchId,
                                lotCode: r.lotCode || '',
                                expiryDate: r.expiryDate ? toYyyyMmDd(r.expiryDate) : '',
                                qty: r.quantity != null ? Number(r.quantity) : 0,
                                supplier: r.supplier || '',
                                receivedBy: by,
                                user: by,
                                notes: r.notes != null ? String(r.notes) : '',
                                warehouseId: r.warehouseId != null && r.warehouseId !== '' ? r.warehouseId : ''
                            };
                        }));
                    }
                }
                if (issueRes && issueRes.ok) {
                    const d = await issueRes.json();
                    if (d.success && Array.isArray(d.data)) {
                        window.storage.set('outRecords', d.data.map(function (r) {
                            const by = r.issuedByName != null ? String(r.issuedByName) : (r.issuedBy != null ? String(r.issuedBy) : '');
                            return {
                                id: r.recordId,
                                recordNumber: r.recordNumber,
                                date: toYyyyMmDd(r.issuedDate),
                                product: r.productName || r.productSku || '',
                                productSku: r.productSku || '',
                                productId: r.productId,
                                batchId: r.batchId,
                                lotCode: r.lotCode || '',
                                expiryDate: r.expiryDate ? toYyyyMmDd(r.expiryDate) : '',
                                qty: r.quantity != null ? Number(r.quantity) : 0,
                                recipient: r.recipient || '',
                                issuedBy: by,
                                user: by,
                                notes: r.notes != null ? String(r.notes) : '',
                                warehouseId: r.warehouseId != null && r.warehouseId !== '' ? r.warehouseId : ''
                            };
                        }));
                    }
                }
            } catch (e) { console.warn('Report API fetch failed:', e.message); }
        }

        async function generateReport(type) {
            await fetchReportDataFromAPI();
            const reportResults = document.getElementById('reportResults');
            const reportContent = document.getElementById('reportContent');
            const reportTitle = document.getElementById('reportTitle');
            let html = '';
            let title = '';
            currentReportType = type;

            switch(type) {
                case 'inventory':
                    title = 'Inventory Summary Report';
                    html = generateInventoryReport();
                    currentReportData = window.storage.get('products') || [];
                    break;
                case 'lowStock':
                    title = 'Low Stock Alert Report';
                    html = generateLowStockReport();
                    const products = window.storage.get('products') || [];
                    currentReportData = products.filter(p => p.totalQty < p.minStock);
                    break;
                case 'expiry':
                    title = 'Expiry Report';
                    html = generateExpiryReport();
                    const batches = window.storage.get('batches') || [];
                    const today = new Date();
                    const next30Days = new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000);
                    currentReportData = batches.filter(b => {
                        const expiryDate = new Date(b.expiryDate);
                        return expiryDate <= next30Days && expiryDate >= today && b.status === 'active';
                    }).sort((a, b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                    break;
                case 'batch':
                    title = 'Batch Details Report';
                    html = generateBatchReport();
                    currentReportData = window.storage.get('batches') || [];
                    break;
                case 'inRecords':
                    title = 'Stock Receipts Report';
                    html = generateInRecordsReport();
                    currentReportData = window.storage.get('inRecords') || [];
                    break;
                case 'outRecords':
                    title = 'Stock Issues Report';
                    html = generateOutRecordsReport();
                    currentReportData = window.storage.get('outRecords') || [];
                    break;
                case 'movement':
                    title = 'Stock Movement Report';
                    html = generateMovementReport();
                    currentReportData = {
                        inRecords: window.storage.get('inRecords') || [],
                        outRecords: window.storage.get('outRecords') || []
                    };
                    break;
                case 'bookings':
                    title = 'Booking Report';
                    html = generateBookingsReport();
                    currentReportData = window.storage.get('bookings') || [];
                    break;
            }

            reportTitle.textContent = title;
            // Also set print title
            const printTitle = document.getElementById('printTitle');
            if (printTitle) {
                printTitle.textContent = title;
            }
            reportContent.innerHTML = html;
            reportResults.style.display = 'block';
            reportResults.scrollIntoView({ behavior: 'smooth' });
            
            // Update button selected state
            updateSelectedButton(type);
        }

        function generateInventoryReport() {
            const products = (window.storage.get('products') || []).slice().sort((a, b) =>
                String(a.sku || a.name || '').localeCompare(String(b.sku || b.name || ''), undefined, { sensitivity: 'base' })
            );
            let html = `<table class="table-container" style="width: 100%;">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Total Qty</th>
                        <th>Available</th>
                        <th>Reserved</th>
                        <th>Min Stock</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>`;
            
            products.forEach(product => {
                const nonExpired = product.nonExpiredQty ?? product.available;
                const allExpired = (product.totalQty || 0) > 0 && (nonExpired || 0) <= 0;
                const status = product.available === 0 && product.totalQty === 0 ? 'Out of Stock' :
                              product.available === 0 && product.totalQty > 0 ? 'Fully Reserved' :
                              allExpired ? 'Expired' :
                              product.totalQty < product.minStock ? 'Low Stock' : 'OK';
                html += `<tr>
                    <td>${product.sku}</td>
                    <td>${product.name}</td>
                    <td>${product.category}</td>
                    <td>${product.totalQty || 0}</td>
                    <td>${product.available || 0}</td>
                    <td>${product.reserved || 0}</td>
                    <td>${product.minStock || 0}</td>
                    <td>${status}</td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            return html;
        }

        function generateLowStockReport() {
            const products = window.storage.get('products') || [];
            const lowStockProducts = products.filter(p => p.totalQty < p.minStock).sort((a, b) =>
                String(a.sku || a.name || '').localeCompare(String(b.sku || b.name || ''), undefined, { sensitivity: 'base' })
            );
            
            let html = `<p><strong>Total Low Stock Items: ${lowStockProducts.length}</strong></p>`;
            html += `<table class="table-container" style="width: 100%;">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Product Name</th>
                        <th>Current Stock</th>
                        <th>Min Stock</th>
                        <th>Shortfall</th>
                    </tr>
                </thead>
                <tbody>`;
            
            lowStockProducts.forEach(product => {
                const shortfall = product.minStock - product.totalQty;
                html += `<tr>
                    <td>${product.sku}</td>
                    <td>${product.name}</td>
                    <td>${product.totalQty || 0}</td>
                    <td>${product.minStock || 0}</td>
                    <td style="color: var(--danger-color);">${shortfall}</td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            return html;
        }

        function generateExpiryReport() {
            const batches = window.storage.get('batches') || [];
            const today = new Date();

        function exportToPDF() {
            const reportTitle = document.getElementById('reportTitle');
            const reportContent = document.getElementById('reportContent');
            
            if (!reportTitle || !reportContent) {
                showNotification('No report to export', 'error');
                return;
            }
            
            const title = reportTitle.textContent;
            const el = reportContent;
            if (!el.innerHTML || !el.innerHTML.trim()) {
                showNotification('No report to export', 'error');
                return;
            }
            
            if (typeof window.jspdf === 'undefined' || typeof html2canvas === 'undefined') {
                showNotification('PDF export libraries not loaded. Please refresh the page.', 'error');
                return;
            }
            
            showNotification('Generating PDF...', 'info');
            
            el.classList.add('report-pdf-capture');
            requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                    html2canvas(el, {
                        scale: Math.min(2, Math.max(1.65, window.devicePixelRatio || 1.75)),
                        useCORS: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        scrollX: 0,
                        scrollY: 0,
                        windowWidth: el.scrollWidth,
                        windowHeight: el.scrollHeight
                    }).then(function (canvas) {
                        el.classList.remove('report-pdf-capture');
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF('p', 'mm', 'a4');
                        const margin = 12;
                        const pdfPageW = pdf.internal.pageSize.getWidth();
                        const pdfPageH = pdf.internal.pageSize.getHeight();
                        const imgWidthMm = pdfPageW - margin * 2;
                        const fullImgHeightMm = (canvas.height / canvas.width) * imgWidthMm;
                        const titleY = 10;
                        const contentTopFirst = 18;
                        const bottomMargin = 12;
                        const availFirst = pdfPageH - contentTopFirst - bottomMargin;
                        const availRest = pdfPageH - margin - bottomMargin;
                        
                        let offsetMm = 0;
                        let pageIndex = 0;
                        while (offsetMm < fullImgHeightMm - 0.25) {
                            if (pageIndex > 0) {
                                pdf.addPage();
                            }
                            if (pageIndex === 0) {
                                pdf.setFontSize(13);
                                pdf.setFont('helvetica', 'bold');
                                pdf.text(title, pdfPageW / 2, titleY, { align: 'center' });
                                pdf.setFont('helvetica', 'normal');
                            }
                            
                            var startY = pageIndex === 0 ? contentTopFirst : margin;
                            var maxSlice = pageIndex === 0 ? availFirst : availRest;
                            var remaining = fullImgHeightMm - offsetMm;
                            var sliceMm = Math.min(maxSlice, remaining);
                            
                            var srcY = Math.floor((offsetMm / fullImgHeightMm) * canvas.height);
                            var srcH = Math.ceil((sliceMm / fullImgHeightMm) * canvas.height);
                            if (srcY + srcH > canvas.height) {
                                srcH = canvas.height - srcY;
                            }
                            if (srcH < 1) {
                                break;
                            }
                            
                            var strip = document.createElement('canvas');
                            strip.width = canvas.width;
                            strip.height = srcH;
                            var sctx = strip.getContext('2d');
                            sctx.fillStyle = '#ffffff';
                            sctx.fillRect(0, 0, strip.width, strip.height);
                            sctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
                            var stripData = strip.toDataURL('image/png');
                            var drawHmm = (srcH / canvas.height) * fullImgHeightMm;
                            pdf.addImage(stripData, 'PNG', margin, startY, imgWidthMm, drawHmm);
                            
                            offsetMm += drawHmm;
                            pageIndex++;
                            if (pageIndex > 80) {
                                break;
                            }
                        }

                        var printedAt = new Date();
                        var printedStr =
                            'Printed: ' +
                            printedAt.toLocaleString(undefined, {
                                year: 'numeric',
                                month: 'long',
                                day: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                        pdf.addPage();
                        pdf.setFont('helvetica', 'normal');
                        pdf.setFontSize(11);
                        pdf.setTextColor(72, 72, 72);
                        pdf.text(printedStr, pdfPageW / 2, pdfPageH - 22, { align: 'center' });
                        pdf.setTextColor(0, 0, 0);
                        
                        var fileName = title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_' + new Date().toISOString().split('T')[0] + '.pdf';
                        pdf.save(fileName);
                        showNotification('PDF exported successfully', 'success');
                    }).catch(function (error) {
                        el.classList.remove('report-pdf-capture');
                        console.error('Error generating PDF:', error);
                        showNotification('Error generating PDF. Please try again.', 'error');
                    });
                });
            });
        }

                const dateStockOut = d.filteredOut.reduce(function (sum, r) { return sum + (r.qty || 0); }, 0);

                    ['Stock Out', d.filteredOut.length, dateStockOut]
                ];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryAoA), 'Summary');
                const inHead = [['Record #', 'Date', 'SKU', 'Product', 'Batch ID', 'Lot code', 'Expiry', 'Qty', 'Supplier', 'Received by', 'Warehouse', 'Notes']];
                const inBody = sortDetailRecordsAsc(d.filteredIn).map(function (r) {
                    return [
                        r.recordNumber || r.id || '',
                        r.date || '',
                        r.productSku || '',
                        r.product || '',
                        r.batchId != null && r.batchId !== '' ? r.batchId : '',
                        r.lotCode || '',
                        r.expiryDate || '',
                        r.qty != null ? r.qty : 0,
                        r.supplier || '',
                        r.receivedBy || r.user || '',
                        r.warehouseId != null && r.warehouseId !== '' ? r.warehouseId : '',
                        r.notes || ''
                    ];
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(inHead.concat(inBody)), 'Stock In');
                const outHead = [['Record #', 'Date', 'SKU', 'Product', 'Batch ID', 'Lot code', 'Expiry', 'Qty', 'Recipient', 'Issued by', 'Warehouse', 'Notes']];
                const outBody = sortDetailRecordsAsc(d.filteredOut).map(function (r) {
                    return [
                        r.recordNumber || r.id || '',
                        r.date || '',
                        r.productSku || '',
                        r.product || '',
                        r.batchId != null && r.batchId !== '' ? r.batchId : '',
                        r.lotCode || '',
                        r.expiryDate || '',
                        r.qty != null ? r.qty : 0,
                        r.recipient || '',
                        r.issuedBy || r.user || '',
                        r.warehouseId != null && r.warehouseId !== '' ? r.warehouseId : '',
                        r.notes || ''
                    ];
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(outHead.concat(outBody)), 'Stock Out');
                XLSX.writeFile(wb, fileName);
                showNotification('Excel file exported successfully', 'success');
                return;
            }
            
            // Prepare data based on report type
            switch(currentReportType) {
                case 'inventory':
                    worksheetData = [
                        ['SKU', 'Product Name', 'Category', 'Total Qty', 'Available', 'Reserved', 'Min Stock', 'Status']
                    ];
                    currentReportData.forEach(product => {
                        const nonExpired = product.nonExpiredQty ?? product.available;
                        const allExpired = (product.totalQty || 0) > 0 && (nonExpired || 0) <= 0;
                        const status = product.available === 0 && product.totalQty === 0 ? 'Out of Stock' :
                                      product.available === 0 && product.totalQty > 0 ? 'Fully Reserved' :
                                      allExpired ? 'Expired' :
                                      product.totalQty < product.minStock ? 'Low Stock' : 'OK';
                        worksheetData.push([
                            product.sku || '',
                            product.name || '',
                            product.category || '',
                            product.totalQty || 0,
                            product.available || 0,
                            product.reserved || 0,
                            product.minStock || 0,
                            status
                        ]);
                    });
                    break;
                    
                case 'lowStock':
                    worksheetData = [
                        ['SKU', 'Product Name', 'Current Stock', 'Min Stock', 'Shortfall']
                    ];
                    currentReportData.forEach(product => {
                        const shortfall = product.minStock - product.totalQty;
                        worksheetData.push([
                            product.sku || '',
                            product.name || '',
                            product.totalQty || 0,
                            product.minStock || 0,
                            shortfall

                        const expiryDate = new Date(batch.expiryDate);

                        worksheetData.push([

                            record.lotCode || '',

                            record.supplier || '',

                case 'outRecords':
                    worksheetData = [
                        ['Record ID', 'Date', 'Product', 'Quantity', 'Recipient', 'Issued By']
                    ];
                    currentReportData.slice().reverse().forEach(record => {
                        worksheetData.push([
                            record.recordNumber || record.id || '',
                            record.date || '',
                            record.product || '',
                            record.qty || 0,
                            record.recipient || '',
                            record.issuedBy || ''
                        ]);
                    });
                    break;
                    
                case 'movement':
                    worksheetData = [
                        ['Type', 'Total Records', 'Total Units']
                    ];
                    const stockIn = currentReportData.inRecords.reduce((sum, r) => sum + (r.qty || 0), 0);
                    const stockOut = currentReportData.outRecords.reduce((sum, r) => sum + (r.qty || 0), 0);
                    worksheetData.push(['Stock In', currentReportData.inRecords.length, stockIn]);
                    worksheetData.push(['Stock Out', currentReportData.outRecords.length, stockOut]);
                    worksheetData.push(['Net Movement', '', stockIn - stockOut]);
                    break;
                    
                case 'bookings':
                    worksheetData = [
                        ['Reference', 'Product', 'Quantity', 'Requested By', 'Requested Date', 'Needed By', 'Status']
                    ];
                    currentReportData.forEach(booking => {
                        worksheetData.push([
                            booking.reference || booking.id || '-',
                            booking.product || booking.productName || '-',
                            booking.quantity || booking.qty || 0,
                            booking.requestedBy || '-',
                            booking.requestedDate || booking.date || '-',
                            booking.neededBy || booking.neededDate || '-',
                            booking.status || '-'
                        ]);
                    });
                    break;
                    
                case 'dateRange':
                    /* Handled above with multi-sheet workbook */
                    worksheetData = [['Date Range — use Export Excel after generating report']];
                    break;
            }
            
            // Create workbook and worksheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(worksheetData);
            
            // Set column widths
            const maxWidths = worksheetData[0].map((_, colIndex) => {
                return Math.max(...worksheetData.map(row => {
                    const cellValue = row[colIndex] ? String(row[colIndex]).length : 0;
                    return cellValue;
                }));
            });
            
            ws['!cols'] = maxWidths.map(width => ({ wch: Math.min(width + 2, 50) }));
            
            // Add worksheet to workbook
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            
            // Save file
            XLSX.writeFile(wb, fileName);
            showNotification('Excel file exported successfully', 'success');
        }

        function printReport() {
            const reportTitle = document.getElementById('reportTitle');
            const reportContent = document.getElementById('reportContent');
            
            if (!reportTitle || !reportContent) {
                showNotification('No report to print', 'error');
                return;
            }
            
            // Get the report content
            const title = reportTitle.textContent;
            const content = reportContent.innerHTML;
            
            // Create a new window with only the report content
            const printWindow = window.open('', '_blank', 'width=800,height=600');
            
            if (!printWindow) {
                showNotification('Please allow popups to print the report', 'error');
                return;
            }
            
            // Write the print-friendly HTML
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${title}</title>
                    <style>
                        body {
                            font-family: Arial, sans-serif;
                            margin: 20px;
                            font-size: 12pt;
                        }
                        h1 {
                            font-size: 18pt;
                            font-weight: bold;
                            margin-bottom: 15px;
                        }
                        p {
                            margin-bottom: 15px;
                            font-size: 11pt;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-top: 10px;
                        }
                        table thead {
                            display: table-header-group;
                        }
                        table tbody {
                            display: table-row-group;
                        }
                        table tr {
                            page-break-inside: avoid;
                        }
                        table th,
                        table td {
                            border: 1px solid #000;
                            padding: 6px 8px;
                            text-align: left;
                            font-size: 10pt;
                        }
                        table th {
                            background-color: #f0f0f0;
                            font-weight: bold;
                        }
                        @media print {
                            body {
                                margin: 0;
                                padding: 20px;
                            }
                        }
                    </style>
                </head>
                <body>
                    <h1>${title}</h1>
                    ${content}
                </body>
                </html>
            `);
            
            printWindow.document.close();
            
            // Wait for content to load, then print
            printWindow.onload = function() {
                setTimeout(function() {
                    printWindow.print();
                    // Optionally close the window after printing
                    // printWindow.close();
                }, 250);
            };
        }
    </script>
</body>
</html>
